<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>AADS Player Competition Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #FF6600; }
    body {
      min-height: 100dvh;
      background: #050505;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 20px;
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 0 60px rgba(255, 102, 0, 0.08);
    }
    .logo-wrap {
      width: 64px;
      height: 64px;
      background: var(--orange);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      color: #000;
      box-shadow: 0 0 40px #FF660044;
    }
    .league {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--orange);
    }
    h1 {
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 14px;
      color: #555;
      text-align: center;
      line-height: 1.6;
    }
    .form-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 18px 36px;
      background: var(--orange);
      color: #000;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-decoration: none;
      border-radius: 14px;
      margin-top: 8px;
      box-shadow: 0 0 28px rgba(255, 102, 0, 0.4);
      transition: filter 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .form-btn:hover { filter: brightness(1.1); }
    .form-btn:active { transform: scale(0.97); }
    .back-link {
      font-size: 12px;
      color: #333;
      text-decoration: none;
      margin-top: 8px;
      transition: color 0.15s;
    }
    .back-link:hover { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">🎯</div>
    <span class="league">AADS Atlantic Darts</span>
    <h1>Player Competition Form</h1>
    <p>Use this form to submit your competition details for the current AADS event.<br>Tap the button below to open the form.</p>
    <a
      class="form-btn"
      href="https://docs.google.com/forms/d/e/1FAIpQLSfkenUW5-fc8ZCPBWmTXhdmC7yo0TSiWpK2NvsDkmP7HwkfCA/viewform"
      target="_blank"
      rel="noopener noreferrer"
    >
      📝 Start the Players Competition Form
    </a>
    <a class="back-link" href="javascript:history.back()">← Back to Wiki</a>
  </div>
</body>
</html>
