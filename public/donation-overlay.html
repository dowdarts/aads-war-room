<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AADS Donation Overlay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: "Segoe UI", system-ui, sans-serif;
      padding: 14px;
      width: 440px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(10, 10, 10, 0.90);
      border: 1px solid rgba(255, 122, 0, 0.45);
      border-radius: 16px;
      overflow: hidden;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }

    .header {
      background: linear-gradient(90deg, #ff7a00, #ffb347);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #111;
    }
    .header-total {
      font-size: 17px;
      font-weight: 900;
      color: #111;
      font-variant-numeric: tabular-nums;
    }

    .section-label {
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,179,71,0.65);
      padding: 10px 14px 5px;
    }

    .spotlight {
      margin: 0 10px 2px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,215,0,0.14), rgba(255,140,0,0.10));
      border: 1px solid rgba(255,215,0,0.40);
      padding: 9px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeIn 0.5s ease;
    }
    .spotlight-icon { font-size: 24px; line-height: 1; flex-shrink: 0; }
    .spotlight-info { flex: 1; min-width: 0; }
    .spotlight-rank {
      font-size: 8px; font-weight: 900; letter-spacing: 0.2em;
      color: #ffd700; text-transform: uppercase; margin-bottom: 1px;
    }
    .spotlight-name {
      font-size: 14px; font-weight: 900; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .spotlight-meta { font-size: 9px; color: rgba(255,255,255,0.38); margin-top: 2px; }
    .spotlight-total {
      font-size: 21px; font-weight: 900; color: #ffd700;
      font-variant-numeric: tabular-nums; white-space: nowrap;
      text-shadow: 0 0 14px rgba(255,215,0,0.55);
    }

    .lb-list { list-style: none; display: flex; flex-direction: column; gap: 3px; padding: 0 10px; }
    .lb-item {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; padding: 5px 10px; animation: fadeIn 0.4s ease;
    }
    .lb-rank { font-size: 10px; font-weight: 900; color: rgba(255,179,71,0.7); width: 18px; flex-shrink: 0; text-align: center; }
    .lb-name { flex: 1; font-size: 12px; font-weight: 700; color: #e8e8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-meta { font-size: 9px; color: rgba(255,255,255,0.3); white-space: nowrap; margin-right: 8px; }
    .lb-total { font-size: 13px; font-weight: 900; color: #5ed38a; font-variant-numeric: tabular-nums; white-space: nowrap; }

    .recent-list { list-style: none; display: flex; flex-direction: column; gap: 3px; padding: 0 10px 2px; }
    .recent-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.045);
      border-radius: 7px; padding: 4px 10px; animation: fadeIn 0.4s ease;
    }
    .recent-left { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .recent-dot { width: 5px; height: 5px; border-radius: 50%; background: #5ed38a; flex-shrink: 0; }
    .recent-name { font-size: 11px; font-weight: 600; color: #d0d0d0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 210px; }
    .recent-rank-badge { font-size: 9px; font-weight: 800; color: rgba(255,179,71,0.75); white-space: nowrap; flex-shrink: 0; margin-left: 4px; }
    .recent-amount { font-size: 12px; font-weight: 900; color: #5ed38a; font-variant-numeric: tabular-nums; white-space: nowrap; }

    .footer { padding: 6px 14px 9px; display: flex; align-items: center; gap: 6px; }
    .pulse {
      width: 6px; height: 6px; border-radius: 50%; background: #5ed38a; flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.7); }
    }
    .footer-text { font-size: 8px; color: rgba(255,255,255,0.25); letter-spacing: 0.1em; }
    .empty-msg { font-size: 11px; color: rgba(255,255,255,0.22); text-align: center; padding: 7px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="header-title">AADS Player Travel Fund</span>
      <span id="headerTotal" class="header-total">$0.00</span>
    </div>

    <div class="section-label">Top Donor</div>
    <div id="spotlight" class="spotlight">
      <div class="empty-msg">Loading&hellip;</div>
    </div>

    <div class="section-label">Leaderboard</div>
    <ul id="lbList" class="lb-list">
      <li class="empty-msg">&mdash;</li>
    </ul>

    <div class="section-label">Recent Tips</div>
    <ul id="recentList" class="recent-list">
      <li class="empty-msg">Loading&hellip;</li>
    </ul>

    <div class="footer">
      <div class="pulse"></div>
      <span class="footer-text">LIVE &bull; Updates every 30s &bull; wiki.aadsdarts.com</span>
    </div>
  </div>

  <script>
    const SUPABASE_URL      = 'https://gygwhznblajojwveikhg.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5Z3doem5ibGFqb2p3dmVpa2hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjU5NzgsImV4cCI6MjA4ODk0MTk3OH0.BI9KlRsCxAvNnFHCGq6hjXfdsaNgo7afY4Xa5uxwjak'
    const REFRESH_MS = 30000

    const headerTotalEl = document.getElementById('headerTotal')
    const spotlightEl   = document.getElementById('spotlight')
    const lbListEl      = document.getElementById('lbList')
    const recentListEl  = document.getElementById('recentList')

    function fmt(v) {
      return new Intl.NumberFormat('en-CA', { style:'currency', currency:'CAD', minimumFractionDigits:2 }).format(v)
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }

    async function get(path) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
        cache: 'no-store',
      })
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      return res.json()
    }

    async function load() {
      try {
        let eventStart = null
        try {
          const ac = await get('payment_access?id=eq.1&select=event_start')
          if (Array.isArray(ac) && ac[0]?.event_start) eventStart = ac[0].event_start
        } catch (_) {}

        const qs = eventStart
          ? `payment_donations?select=donor_name,amount,received_at&order=received_at.desc&limit=500&received_at=gte.${encodeURIComponent(eventStart)}`
          : `payment_donations?select=donor_name,amount,received_at&order=received_at.desc&limit=500`

        const rows = await get(qs)

        // Grand total
        const grandTotal = rows.reduce((s, r) => {
          const v = Number(r.amount); return s + (Number.isFinite(v) ? v : 0)
        }, 0)
        headerTotalEl.textContent = fmt(grandTotal)

        if (!rows.length) {
          spotlightEl.innerHTML  = '<div class="empty-msg">No donations yet</div>'
          lbListEl.innerHTML     = '<li class="empty-msg">&mdash;</li>'
          recentListEl.innerHTML = '<li class="empty-msg">No tips yet</li>'
          return
        }

        // Aggregate by normalised name
        const map = new Map()
        for (const r of rows) {
          const display = (r.donor_name || 'Anonymous').trim()
          const key     = display.toUpperCase()
          const amt     = Number.isFinite(Number(r.amount)) ? Number(r.amount) : 0
          if (map.has(key)) {
            const e = map.get(key); e.total += amt; e.count++
          } else {
            map.set(key, { display, total: amt, count: 1 })
          }
        }

        // Sort leaderboard descending by total
        const board = [...map.values()].sort((a, b) => b.total - a.total)

        // Rank lookup: UPPER_NAME -> rank number
        const rankOf = new Map()
        board.forEach((e, i) => rankOf.set(e.display.toUpperCase(), i + 1))

        // Render #1 spotlight
        const top = board[0]
        const topCountLabel = top.count === 1 ? '1 tip' : `${top.count} tips`
        spotlightEl.innerHTML = `
          <div class="spotlight-icon">&#x1F451;</div>
          <div class="spotlight-info">
            <div class="spotlight-rank">#1 &nbsp;Top Donor</div>
            <div class="spotlight-name">${esc(top.display)}</div>
            <div class="spotlight-meta">${topCountLabel} &middot; combined total</div>
          </div>
          <div class="spotlight-total">${fmt(top.total)}</div>
        `

        // Render leaderboard #2-#5
        const rest = board.slice(1, 5)
        if (!rest.length) {
          lbListEl.innerHTML = '<li class="empty-msg">No other donors yet</li>'
        } else {
          lbListEl.innerHTML = rest.map((e, i) => {
            const rank = i + 2
            const cl   = e.count === 1 ? '1 tip' : `${e.count} tips`
            return `<li class="lb-item">
              <span class="lb-rank">#${rank}</span>
              <span class="lb-name">${esc(e.display)}</span>
              <span class="lb-meta">${cl}</span>
              <span class="lb-total">${fmt(e.total)}</span>
            </li>`
          }).join('')
        }

        // Render last 3 individual tips with live rank badge
        const recent = rows.slice(0, 3)
        recentListEl.innerHTML = recent.map(r => {
          const name  = (r.donor_name || 'Anonymous').trim()
          const rank  = rankOf.get(name.toUpperCase())
          const amt   = Number.isFinite(Number(r.amount)) ? fmt(Number(r.amount)) : '-'
          const badge = rank ? `<span class="recent-rank-badge">#${rank}</span>` : ''
          return `<li class="recent-item">
            <div class="recent-left">
              <div class="recent-dot"></div>
              <span class="recent-name">${esc(name)}</span>
              ${badge}
            </div>
            <span class="recent-amount">${amt}</span>
          </li>`
        }).join('')

      } catch (_) { /* keep last render on network error */ }
    }

    load()
    setInterval(load, REFRESH_MS)
  </script>
</body>
</html>
